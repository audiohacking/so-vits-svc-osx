name: Build macOS Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v5.0.0)'
        required: true
        default: 'v5.0.0-macos'

permissions:
  contents: write
  packages: write

jobs:
  build-macos:
    name: Build macOS Application
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set version from release tag
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "Setting version to: $VERSION"
        echo "$VERSION" > VERSION
        cat VERSION
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Create venv and install dependencies (match build_local.sh)
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyyaml
        pip install torch torchaudio torchvision
        pip install "pyinstaller>=6.0" "pywebview>=4.0"
        python -c "import gradio; import torch; import yaml; import ruamel.yaml; print('OK')"

    - name: Check build/macos assets
      run: |
        if [ ! -f "build/macos/entitlements.plist" ]; then
          echo "::error::build/macos/entitlements.plist not found"
          exit 1
        fi
        if [ ! -f "build/macos/codesign.sh" ]; then
          echo "::error::build/macos/codesign.sh not found"
          exit 1
        fi

    - name: Clean previous PyInstaller outputs
      run: |
        rm -rf dist/SoVitsSVC.app dist/SoVitsSVC build/SoVitsSVC

    - name: Build with PyInstaller
      shell: bash
      run: |
        source .venv/bin/activate
        python -m PyInstaller sovits_svc.spec --clean --noconfirm

    - name: Set up app bundle executable
      run: |
        # Copy SoVitsSVC_bin to SoVitsSVC so the app runs the real binary
        cp dist/SoVitsSVC.app/Contents/MacOS/SoVitsSVC_bin dist/SoVitsSVC.app/Contents/MacOS/SoVitsSVC
        chmod +x dist/SoVitsSVC.app/Contents/MacOS/SoVitsSVC
        
    - name: Code sign the app bundle
      run: |
        # Run the code signing script with ad-hoc signing (no certificate required for dev builds)
        chmod +x build/macos/codesign.sh
        ./build/macos/codesign.sh dist/SoVitsSVC.app
      env:
        MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY || '-' }}
        
    - name: Create DMG (macOS disk image)
      run: |
        # Create a temporary directory for DMG contents
        mkdir -p dmg_temp
        cp -R dist/SoVitsSVC.app dmg_temp/
        
        # Create Applications symlink for easy drag-and-drop install
        ln -s /Applications dmg_temp/Applications
        
        # Copy README for users if it exists
        if [ -f ".github/DMG_README.txt" ]; then
          cp .github/DMG_README.txt dmg_temp/README.txt
        fi
        
        # Create DMG
        hdiutil create -volname "SoVitsSVC" \
          -srcfolder dmg_temp \
          -ov -format UDZO \
          SoVitsSVC-macOS.dmg
          
    - name: Create ZIP archive (alternative distribution)
      run: |
        cd dist
        zip -r ../SoVitsSVC-macOS.zip SoVitsSVC.app
        cd ..
        
    - name: Calculate checksums
      run: |
        shasum -a 256 SoVitsSVC-macOS.dmg > checksums.txt
        shasum -a 256 SoVitsSVC-macOS.zip >> checksums.txt
        cat checksums.txt
        
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoVitsSVC-macOS-DMG
        path: SoVitsSVC-macOS.dmg
        
    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoVitsSVC-macOS-ZIP
        path: SoVitsSVC-macOS.zip
        
    - name: Upload to Release (if triggered by release)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          SoVitsSVC-macOS.dmg
          SoVitsSVC-macOS.zip
          checksums.txt
